<!DOCTYPE html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact - Twin Tiger Chefs</title>
<meta name="description" content="Contact Twin Tiger Chefs for a free consultation.">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="styles.css">
<style>
  .consult .cta-call-head{color:inherit;text-decoration:none;transition:color .2s ease}
  .consult .cta-call-head:hover{color:var(--brand)}
  .cta-actions{display:flex;flex-wrap:wrap;gap:12px;margin:4px 0 0}
  .cta-btn{display:inline-block;font-family:var(--sans);font-weight:400;font-size:13px;
    letter-spacing:.2em;text-transform:uppercase;color:var(--dark-text);
    border:1px solid rgba(233,225,211,.5);padding:13px 28px;text-decoration:none;border-radius:2px;
    transition:background-color .2s ease,color .2s ease,border-color .2s ease}
  .cta-btn:hover{background:var(--dark-text);color:var(--dark);border-color:var(--dark-text)}
  .cta-btn.amber{background:var(--brand);border-color:var(--brand);color:#fff}
  .cta-btn.amber:hover{background:#fff;border-color:#fff;color:var(--brand)}
  .social-row{display:flex;gap:14px;align-items:center;margin-top:30px}
  .social-ic{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;
    border:1px solid rgba(233,225,211,.4);border-radius:50%;color:var(--accent);text-decoration:none;
    transition:color .25s ease,border-color .25s ease,background-color .25s ease}
  .social-ic:hover{color:#fff;background:var(--brand);border-color:var(--brand)}
  .social-ic svg{display:block}
</style>
</head>

        <a href="checklists.html">Checklists</a>
        <a href="sops.html">SOPs</a>
        <a href="case-studies.html">Case Studies</a>
        <a href="articles.html">Articles</a>
      </div>
    </div>
    <a href="contact.html">Contact</a>
  </div>

<section class="contact">
  <div class="wrap">
    <form class="form" id="contactForm" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="2ed659d3-a5d4-429e-8fe5-64a777c4c9af">
      <input type="hidden" name="subject" value="New enquiry from Twin Tiger Chefs website">
      <select class="full" name="client_type">
        <option value="" disabled selected>Where are you on your restaurant journey?</option>
        <option value="I'm Just Planning" data-stage="planning">I'm Just Planning</option>
        <option value="I'm Looking for a Location" data-stage="location-search">I'm Looking for a Location</option>
        <option value="I Have a Location" data-stage="have-location">I Have a Location</option>
        <option value="We're Ready to Open" data-stage="ready-to-open">We're Ready to Open</option>
        <option value="My Restaurant Isn't Performing" data-stage="underperforming">My Restaurant Isn't Performing</option>
        <option value="I Want to Revamp My Restaurant" data-stage="revamp">I Want to Revamp My Restaurant</option>
        <option value="My Restaurant Has Closed" data-stage="closed">My Restaurant Has Closed</option>
        <option value="I Want to Expand" data-stage="expand">I Want to Expand</option>
      </select>
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" class="full" name="phone" placeholder="Phone" required>
      <input type="text" class="full" name="project" placeholder="Your restaurant or project">
      <textarea class="full" name="message" placeholder="Tell us a little about it" required></textarea>
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">
      <button class="cta submit" type="submit">Send</button>
    </form>
    <p class="form-status" role="status" aria-live="polite"></p>
    <!-- Social links. Instagram is the real Twin Tiger account reused from the live site. WhatsApp href is a PLACEHOLDER pending the real number. -->
    <div class="social-row">
      <a class="social-ic" href="https://www.instagram.com/twintigerchefs" target="_blank" rel="noopener" aria-label="Twin Tiger Chefs on Instagram">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.6" cy="6.4" r="1.15" fill="currentColor" stroke="none"/></svg>
      </a>
      <a class="social-ic" href="https://wa.me/PLACEHOLDER-NUMBER" target="_blank" rel="noopener" aria-label="Twin Tiger Chefs on WhatsApp">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 0 0 4.79 1.22h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2Zm0 1.8c2.17 0 4.2.85 5.74 2.38a8.06 8.06 0 0 1 2.38 5.73c0 4.48-3.65 8.12-8.12 8.12a8.1 8.1 0 0 1-4.13-1.13l-.3-.18-3.12.82.83-3.04-.19-.31a8.06 8.06 0 0 1-1.24-4.28c0-4.48 3.64-8.12 8.12-8.12Zm4.68 10.29c-.26-.13-1.51-.75-1.75-.83-.24-.09-.41-.13-.58.13-.17.26-.66.83-.81 1-.15.17-.3.19-.56.06-.26-.13-1.08-.4-2.06-1.27-.76-.68-1.28-1.52-1.43-1.78-.15-.26-.02-.4.11-.53.12-.12.26-.3.39-.46.13-.15.17-.26.26-.43.09-.17.04-.32-.02-.45-.06-.13-.58-1.4-.8-1.92-.21-.5-.42-.43-.58-.44l-.5-.01c-.17 0-.45.06-.68.32-.24.26-.9.88-.9 2.15 0 1.27.92 2.5 1.05 2.67.13.17 1.81 2.76 4.38 3.87.61.26 1.09.42 1.46.54.61.2 1.17.17 1.61.1.49-.07 1.51-.62 1.72-1.21.21-.6.21-1.11.15-1.21-.06-.11-.24-.17-.5-.3Z"/></svg>
      </a>
    </div>
  </div>
